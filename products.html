<!DOCTYPE html>
<html lang="zh-CN">

<!-- 导航栏 -->

    <a href="index.html" class="logo">AURELIA<span>.</span></a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">首页</a>
      <a href="products.html" class="active">全部商品</a>
      <a href="about.html">关于我们</a>
    </div>
    <div class="nav-icons">
      <a href="products.html">🔍</a>
      <a href="#" id="cartBtn">🛒<span class="cart-badge" id="cartBadge" style="display:none">0</span></a>
    </div>
  </div>
</nav>

<!-- 页面标题 -->
<section class="section" style="padding: 40px 0 20px;">
  <div class="container">
    <div class="section-title">
      <h2>全部商品</h2>
      <div class="divider"></div>
      <p class="sub">ALL PRODUCTS</p>
    </div>
  </div>
</section>

<!-- 产品列表 -->
<section class="section" style="padding-top: 0;">
  <div class="container">
    <div class="categories">
      <button class="active" data-cat="全部">全部</button>
      <button data-cat="项链">项链</button>
      <button data-cat="耳饰">耳饰</button>
      <button data-cat="手链">手链</button>
      <button data-cat="戒指">戒指</button>
    </div>
    <div class="product-grid"></div>
  </div>
</section>

<!-- 购物车侧栏 -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="header">
    <h3>购物车 <span class="cart-count" id="cartCount">0</span></h3>
    <button class="close-btn" id="cartClose">✕</button>
  </div>
  <div class="items" id="cartItems">
    <div class="cart-empty">购物车是空的</div>
  </div>
  <div class="footer">
    <div class="total">合计：<span id="cartTotal">¥0</span></div>
    <button class="btn btn-gold" onclick="showToast('结算功能开发中')">去结算</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 返回顶部 -->
<button class="back-to-top" id="backToTop">↑</button>

<!-- 页脚 -->
<footer class="footer">
  <div class="footer-grid">
    <div class="footer-brand">
      <h3>AURELIA<span>.</span></h3>
      <p>专注轻奢饰品设计，用匠心诠释优雅。我们相信，每一件饰品都承载着独特的故事与情感。</p>
    </div>
    <div class="footer-col">
      <h4>快速链接</h4>
      <a href="index.html">首页</a>
      <a href="products.html">全部商品</a>
      <a href="about.html">关于我们</a>
    </div>

      <h4>商品分类</h4>
      <a href="products.html?cat=项链">项链</a>
      <a href="products.html?cat=耳饰">耳饰</a>

    <div class="footer-col">
      <h4>联系我们</h4>
      <a>service@aurelia.com</a>
      <a>微信公众号：AURELIA</a>
      <a>小红书：@AURELIA</a>
    </div>
  </div>

    © 2026 AURELIA. All Rights Reserved. &nbsp;|&nbsp; Web前端开发技术 期末作品
